name: kp_bio
channels: [conda-forge, bioconda, defaults]
dependencies:
  - python=3.10
  # Raw reads QC
  - fastqc=0.12.1
  - multiqc=1.21
  - fastp=0.23.4
  # Assembly QC — PAPER EXACT VERSIONS
  - quast=5.2.0              # Paper: QUAST v5.2.0
  - fastani=1.33             # Paper: fastANI v1.33
  # De novo assembly (SRA raw reads track)
  - spades=3.15.5
  # Annotation
  - prokka=1.14.6            # Paper: Prokka v1.13.4 (use latest compatible)
  # Genotyping — PAPER EXACT VERSION
  - kleborate=3.0.8          # Paper: Kleborate v3.0.8 ← CRITICAL
  - mlst=2.23.0
  # AMR/virulence screening — PAPER EXACT
  - abricate=1.0.1           # Paper: ABRicate v1.0.1, 90%/90% threshold
  # Phylogenetics — PAPER EXACT TOOLS
  - harvest-tools            # Contains Parsnp v1.2 — Paper: Parsnp v1.2
  - fasttree=2.1.11          # Paper: FastTree v2.1 GTR+GAMMA
  - iqtree2=2.2.6            # Alternative validation
  # cgMLST — PAPER EXACT
  - chewbbaca=3.3.9          # Paper: chewBBACA v3.3.9
  # Plasmid analysis — PAPER EXACT
  - mob-suite=3.19           # Paper: MOB-Suite v3.19
  - mash=2.3                 # Paper: Mash v2.2
  # IS element detection — PAPER EXACT
  - digis                    # Paper: digIS v1.2
  # Sequence utilities
  - seqkit=2.7.0
  - samtools=1.19
  - bwa=0.7.17
  # R visualization
  - r-base=4.3.2
  - r-ggplot2
  - r-ggtree
  - r-gggenomes             # Paper: Figure 6 gene synteny
  - bioconductor-complexheatmap
  - r-phangorn
  - r-ape
  - r-dplyr
  - r-tidyr
  - r-patchwork
  - r-viridis
  - r-ggpubr
  - r-rnaturalearth
  - pip:
    - mlflow
    - python-louvain==0.16   # Paper: python-louvain v0.16 EXACT
    - networkx
    - grapetree              # Paper: GrapeTree v1.5.0
